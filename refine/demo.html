<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timeline Inspector — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* @inject-skip-start (demo-only global resets — excluded from the injected build) */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    /* @inject-skip-end */

    :root {
      /* theme tokens (exact Figma — Logram design system) */
      --c-text: #17181c; --c-text-strong: #1b1b1b; --c-text-mut: #585858;
      --c-text-mut2: #696969; --c-text-faint: #979797; --c-count: #9b9b9b;
      --c-ruler: #8b9099; --c-disabled: #9294a6; --c-label: #5e6073;
      --c-blue: #0071e2; --c-blue-pressed: #0073e5; --c-blue-bg: rgba(0,117,237,0.06); --c-blue-bg-h: rgba(0,117,237,0.1);
      --c-blue-bg-a: rgba(0,117,237,0.14); --c-blue-ring: rgba(0,102,215,0.1);
      /* secondary button (grey 170 @ alpha) */
      --c-sec: rgba(170,170,170,0.1); --c-sec-h: rgba(170,170,170,0.2); --c-sec-a: rgba(170,170,170,0.28);
      /* ghost button hover/pressed */
      --c-ghost-h: #f7f7f7; --c-ghost-a: #f0f0f0;
      /* play/pause circle */
      --c-circle: #ffffff; --c-circle-h: #f9f9f9; --c-circle-a: #f4f4f4;
      /* fields + tracks */
      --c-field-bg: rgba(238,238,239,0.51); --c-fill: rgba(219,219,219,0.4); --c-fill-a: rgba(219,219,219,0.6);
      --c-track: #eeeeef; --c-track-h: #e9e9e9; --c-thumb: #767676;
      --c-line: #ededf0; --c-hairline: rgba(0,0,0,0.04); --c-hairline2: rgba(0,0,0,0.06);
      /* shadow recipes (exact Figma) */
      --ring: inset 0 0 0 1px rgba(0,0,0,0.06), inset 0 -1px 0 0 rgba(0,0,0,0.06), inset 0 0 0 1px rgba(196,196,196,0.1);
      /* blue button inset ring (exact Figma node 580:753) */
      --ring-blue: inset 0 0 0 1px rgba(0,101,208,0.1), inset 0 -1px 0 0 rgba(3,66,142,0.15);
      --ring-fill: inset 0 0 0 1px rgba(0,0,0,0.02), inset 0 -1px 0 0 rgba(0,0,0,0.06), inset 0 0 0 1px rgba(196,196,196,0.1);
      --drop: 0 1px 3px 0 rgba(0,0,0,0.04);
      /* topbar button drop shadow — exact Figma node 580:753 (navy-tinted) */
      --drop-btn: 0 1px 3px 0 rgba(4,41,117,0.08);
      /* secondary/raised white button (Reset, Settings, Copy, Accept) — exact spec */
      --shadow-btn: 0 1px 3px 0 rgba(0,0,0,0.04), inset 0 0 0 1px rgba(0,0,0,0.06), inset 0 -1px 0 0 rgba(0,0,0,0.10), inset 0 0 0 1px rgba(196,196,196,0.10);
      --drop-line: 0 1px 3px 0 rgba(0,0,0,0.08);
      --shadow-border: 0 0 0 1px rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.06), 0 2px 4px 0 rgba(0,0,0,0.04);
      --shadow-border-hover: 0 0 0 1px rgba(0,0,0,0.08), 0 1px 2px -1px rgba(0,0,0,0.08), 0 2px 4px 0 rgba(0,0,0,0.06);
      --panel-shadow: 0 10px 40px rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.06), 0 1px 1px rgba(0,0,0,0.06), 0 2px 6px rgba(0,0,0,0.05);
      --menu-shadow: 0 0 0 1px rgba(0,0,0,0.06), 0 2px 6px rgba(0,0,0,0.05), 0 4px 42px rgba(0,0,0,0.06);
      --card-shadow: 0 0 0 1px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);

      /* transitions.dev — menu dropdown */
      --dropdown-open-dur: 250ms; --dropdown-close-dur: 150ms;
      --dropdown-pre-scale: 0.97; --dropdown-closing-scale: 0.99;
      --dropdown-ease: cubic-bezier(0.22, 1, 0.36, 1);
      /* transitions.dev — icon swap */
      --icon-swap-dur: 200ms; --icon-swap-blur: 2px; --icon-swap-start-scale: 0.25; --icon-swap-ease: ease-in-out;
      /* transitions.dev — tooltip */
      --tt-in-dur: 150ms; --tt-out-dur: 50ms; --tt-scale: 0.98; --tt-delay: 80ms;
      --tt-in-ease: ease-out; --tt-out-ease: ease-out; --tt-bg: #ffffff; --tt-fg: #2f2f2f;
      /* transitions.dev — easing motion tokens (verbatim from skill _root.css) */
      --panel-ease: cubic-bezier(0.22, 1, 0.36, 1);   /* shared standard ease-out */
      --morph-ease: cubic-bezier(0.34, 1.25, 0.64, 1);
      --morph-open-dur: 350ms;
      --morph-close-dur: 250ms;
      --morph-close-ease: cubic-bezier(0.22, 1, 0.36, 1);
      --morph-r-closed: 40px;
      --morph-r-open: 20px;
      --morph-fade-dur: 200ms;
      --morph-slide: 40px;
      --morph-rotate: 45deg;
      --morph-scale: 0.97;
      --morph-blur: 2px;
      --check-ease-bob: cubic-bezier(0.34, 1.35, 0.64, 1);
      --badge-pop-ease: cubic-bezier(0.34, 1.36, 0.64, 1);
      --digit-ease: cubic-bezier(0.34, 1.45, 0.64, 1);
      --avatar-ease-out: cubic-bezier(0.34, 3.85, 0.64, 1);
      --badge-close-ease: cubic-bezier(0.4, 0, 0.2, 1);
      --text-swap-ease: ease-in-out;
      --shimmer-ease: linear;
      /* transitions.dev — panel reveal (per-phase distance/ease/scale) */
      --panel-open-dur: 400ms; --panel-close-dur: 350ms;
      /* refine panel close runs a touch longer than the main panel close */
      --refine-close-dur: 350ms;
      --panel-open-distance: 100px; --panel-close-distance: 10px;
      --panel-open-ease: var(--panel-ease); --panel-close-ease: var(--panel-ease);
      --panel-scale: 1; --panel-scale-close: 1;
      --panel-blur: 2px;
    }

    /* @inject-skip-start (demo-only page + sample-box styles — excluded from the injected build) */
    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: #fafafa;
      color: var(--c-text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .demo-root { max-width: 900px; margin: 0 auto; padding: 48px 24px 120px; }
    .demo-header { margin-bottom: 40px; }
    .demo-header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; color: #171717; }
    .demo-header p  { color: var(--c-ruler); font-size: 14px; margin-top: 6px; }
    .demo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
    .card { padding: 24px; background: #fff; border-radius: 14px; box-shadow: 0 0 0 1px rgba(0,0,0,0.05), 0 2px 6px rgba(0,0,0,0.04); }
    .card h2 { font-size: 15px; font-weight: 600; margin-bottom: 4px; color: #171717; }
    .card p  { font-size: 12px; color: var(--c-ruler); margin-bottom: 16px; line-height: 1.5; }

    /* Anchor sized to the OPEN footprint so the box grows up-and-left out of the corner. */
    .morph-stage { position: relative; width: 183px; height: 172px; margin: 8px auto 0; }

    /* Plus → menu morph — verbatim from transitions.dev skill (20-plus-menu-morph.md).
       Closed: a small circular button. Open: a rounded panel.
       Width/height/border-radius animate; the open state uses a
       bouncier ease than the close. */
    .t-morph {
      position: absolute;
      inset: auto 0 0 auto;
      width: 40px;
      height: 40px;
      border-radius: var(--morph-r-closed);
      overflow: hidden;
      background: #fff;
      box-shadow: var(--card-shadow);
      transition:
        width var(--morph-close-dur) var(--morph-close-ease),
        height var(--morph-close-dur) var(--morph-close-ease),
        border-radius var(--morph-close-dur) var(--morph-close-ease);
    }
    .t-morph[data-open="true"] {
      width: 183px;
      height: 172px;
      border-radius: var(--morph-r-open);
      transition:
        width 400ms var(--morph-ease),
        height var(--morph-open-dur) var(--morph-ease),
        border-radius var(--morph-open-dur) var(--morph-ease);
    }
    /* Plus fades + slides out and the icon rotates into an ×. */
    .t-morph-plus {
      position: absolute;
      inset: auto 0 0 auto;
      width: 40px; height: 40px;
      display: grid; place-items: center;
      border: 0; background: transparent; cursor: pointer;
      color: var(--c-text);
      transition:
        opacity var(--morph-fade-dur) var(--morph-close-ease),
        transform var(--morph-open-dur) var(--morph-close-ease),
        filter var(--morph-fade-dur) var(--morph-close-ease);
    }
    .t-morph-plus svg {
      transition: transform var(--morph-open-dur) var(--morph-close-ease);
    }
    .t-morph[data-open="true"] .t-morph-plus {
      opacity: 0;
      transform: translateX(calc(-1 * var(--morph-slide)));
      filter: blur(var(--morph-blur));
      pointer-events: none;
    }
    .t-morph[data-open="true"] .t-morph-plus svg {
      transform: scale(var(--morph-scale)) rotate(var(--morph-rotate));
    }
    /* Menu starts slid in + scaled + blurred; reveals on open. */
    .t-morph-menu {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: translateX(var(--morph-slide)) scale(var(--morph-scale));
      filter: blur(var(--morph-blur));
      pointer-events: none;
      transition:
        opacity var(--morph-fade-dur) var(--morph-close-ease),
        transform var(--morph-open-dur) var(--morph-close-ease),
        filter var(--morph-fade-dur) var(--morph-close-ease);
    }
    .t-morph[data-open="true"] .t-morph-menu {
      opacity: 1;
      transform: translateX(0) scale(1);
      filter: blur(0);
      pointer-events: auto;
    }
    /* menu contents */
    .t-morph-menu { padding: 12px; display: flex; flex-direction: column; }
    .t-morph-menu .morph-title { font-size: 12px; font-weight: 600; color: var(--c-text-mut);
      padding: 4px 8px 8px; }
    .t-morph-menu button.morph-item { display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 9px 8px; border: 0; background: transparent; border-radius: 8px;
      font: inherit; font-size: 13px; color: var(--c-text); text-align: left; cursor: pointer;
      transition: background 120ms ease; }
    .t-morph-menu button.morph-item:hover { background: var(--c-ghost-h); }

    @media (prefers-reduced-motion: reduce) {
      .t-morph, .t-morph-plus, .t-morph-menu { transition: none !important; }
    }
    /* @inject-skip-end */

    /* ───────────────────── timeline panel ───────────────────── */
    /* unified panel container — single rounded surface, no gaps (matches Figma) */
    [data-timeline-panel] {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 99999;
      display: flex; flex-direction: column; gap: 0;
      padding: 12px; color: var(--c-text);
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      font-size: 13px; background: transparent; pointer-events: none;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    [data-timeline-panel] > * { pointer-events: auto; }
    .tl-resize-handle {
      position: absolute; top: 0; left: 0; right: 0; height: 14px; z-index: 12;
      cursor: ns-resize; touch-action: none;
    }
    .tl-resize-handle::after {
      content: ""; position: absolute; left: 50%; top: 6px; transform: translateX(-50%);
      width: 40px; height: 3px; border-radius: 2px; background: #dcdce2; pointer-events: none;
      transition: background 0.15s;
    }
    .tl-resize-handle:hover::after, .tl-resize-handle.dragging::after { background: var(--c-thumb); }
    .tl-panel-body { position: relative; flex: 1; min-height: 0; display: flex; flex-direction: row; gap: 0; pointer-events: auto;
      background: #fff; border-radius: 12px;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08), 0 2px 6px 0 rgba(0, 0, 0, 0.05), 0 4px 42px 0 rgba(0, 0, 0, 0.06);
      overflow: hidden; }
    .tl-panel-body > * { pointer-events: auto; }
    /* timeline content column — full width; the refine panel overlays it without reflow */
    .tl-panel-main { flex: 1; min-width: 0; min-height: 0; display: flex; flex-direction: column; gap: 0; overflow: hidden; }
    /* transient toast (Copy values → "Values copied"). enter 250ms Fast,
       exit 350ms Medium (toast-close token), Smooth ease out both ways. */
    .tl-toast-wrap { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
      z-index: 2147483600; pointer-events: none; }
    .tl-toast { display: inline-flex; align-items: center; gap: 6px; height: 32px; padding: 0 14px 0 10px;
      border-radius: 60px; background: #fff; color: var(--c-text-strong);
      font: inherit; font-size: 13px; font-weight: 400; line-height: 14px; white-space: nowrap;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 2px 6px 0 rgba(0,0,0,0.05), 0 4px 42px 0 rgba(0,0,0,0.06);
      animation: tl-toast-in 250ms cubic-bezier(0.22,1,0.36,1) both; }
    .tl-toast.is-closing { animation: tl-toast-out 350ms cubic-bezier(0.22,1,0.36,1) both; }
    /* gray icon to match the Accept button's icon (#17181C) */
    .tl-toast-ic { display: flex; flex: none; color: #17181C; }
    @keyframes tl-toast-in { from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to { opacity: 1; transform: none; } }
    @keyframes tl-toast-out { from { opacity: 1; transform: none; }
      to { opacity: 0; transform: translateY(8px) scale(0.98); } }
    @media (prefers-reduced-motion: reduce) {
      .tl-toast, .tl-toast.is-closing { animation: none; } }
    .tl-pill { position: fixed; bottom: 16px; right: 16px; z-index: 99999;
      height: 40px; background: #fff; border-radius: 36px;
      padding: 6px 10px 6px 16px;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: var(--drop), var(--ring); transition: background 0.15s, scale 0.12s ease;
      animation: tl-pill-in 220ms cubic-bezier(0.22, 1, 0.36, 1) both; }
    @keyframes tl-pill-in { from { opacity: 0; transform: translateY(6px) scale(0.96); }
      to { opacity: 1; transform: none; } }
    .tl-pill:hover { background: #f9f9f9; }
    .tl-pill:active { background: #f9f9f9; scale: 0.96; }
    .tl-pill-label { font-size: 13px; font-weight: 500; line-height: 14px; color: var(--c-text); white-space: nowrap; }
    .tl-pill-count { display: flex; align-items: center; justify-content: center;
      height: 20px; min-width: 20px; padding: 0 6px; border-radius: 999px;
      background: #060606; color: #fff; font-size: 11px; font-weight: 600; line-height: 16px;
      box-shadow: 0 1px 3px 0 rgba(0,0,0,0.2), inset 0 0 0 1px rgba(0,0,0,0.06), inset 0 -1px 0 0 rgba(0,0,0,0.06); }
    /* single-digit count → perfect circle (no side padding so width == height) */
    .tl-pill-count.is-single { width: 20px; padding: 0; }

    /* ── header row ── */
    .tl-header { flex: none; position: relative; z-index: 40; display: flex; align-items: center; gap: 8px; padding: 7.5px 14px;
      border-bottom: 1px solid var(--c-line); }
    .tl-header-label { font-size: 13px; font-weight: 500; line-height: 18px; color: var(--c-text-mut2); white-space: nowrap; }
    .tl-header-count { margin-left: auto; display: inline-flex; align-items: center; font-size: 13px; line-height: 18px; color: var(--c-count); white-space: nowrap; }

    /* ── buttons ── */
    /* topbar buttons share a fully rounded 60px corner radius */
    .tl-header .tl-ghost-btn,
    .tl-header .tl-icon-btn,
    .tl-header .tl-sec-btn,
    .tl-header .tl-accept-btn,
    .tl-header .tl-refine-btn { border-radius: 60px; }
    .tl-accept-btn { display: inline-flex; align-items: center; gap: 6px; height: 36px; padding: 0 14px;
      border: none; cursor: pointer; font: inherit; font-weight: 500; font-size: 13px; line-height: 14px; color: #17181C;
      background: #fff; box-shadow: var(--shadow-btn);
      transition: background 140ms ease, scale 140ms ease, opacity 140ms ease; }
    .tl-accept-btn > svg { width: 16px; height: 16px; color: #17181C; flex: none; }
    .tl-accept-btn:hover:not(:disabled) { background: #f9f9f9; }
    .tl-accept-btn:active:not(:disabled) { background: #f9f9f9; scale: 0.96; }
    .tl-accept-btn:disabled { opacity: 0.5; cursor: default; }
    .tl-accept-spin { width: 16px; height: 16px; flex: none; border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.15); border-top-color: #17181C; animation: tl-accept-rot 0.7s linear infinite; }
    @keyframes tl-accept-rot { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .tl-accept-spin { animation-duration: 1.4s; } }

    /* ghost button: transparent, grey on hover/pressed (Figma #f7f7f7) */
    .tl-ghost-btn { position: relative; display: inline-flex; align-items: center; gap: 6px; height: 36px;
      padding: 0 10px 0 12px; border: none; background: transparent; border-radius: 8px;
      font: inherit; font-size: 13px; font-weight: 500; line-height: 16px; color: var(--c-text-strong); cursor: pointer;
      transition: background 0.12s ease, scale 0.12s ease; white-space: nowrap; }
    .tl-ghost-btn:hover:not(:disabled), .tl-ghost-btn.is-active { background: var(--c-ghost-h); }
    .tl-ghost-btn:active:not(:disabled) { background: var(--c-ghost-a); scale: 0.97; }
    .tl-ghost-btn:disabled { opacity: 0.6; cursor: default; }
    .tl-ghost-btn .tl-dim { color: var(--c-text-faint); font-weight: 500; }
    .tl-ghost-chev { display: flex; color: var(--c-ruler); }

    /* icon button: secondary fill, raised with the shared Figma button shadow */
    .tl-icon-btn { position: relative; display: inline-flex; align-items: center; justify-content: center; flex: none;
      width: 36px; height: 36px; border: none; border-radius: 8px; background: var(--c-sec);
      box-shadow: var(--shadow-btn);
      color: var(--c-text-mut2); cursor: pointer; transition: background 0.12s ease, color 0.12s ease, scale 0.12s ease; }
    .tl-icon-btn:hover:not(:disabled), .tl-icon-btn.is-active { background: var(--c-sec-h); }
    .tl-icon-btn:active:not(:disabled) { background: var(--c-sec-a); scale: 0.96; }
    .tl-icon-btn:disabled { opacity: 0.5; cursor: default; }
    .tl-icon-btn.ghost { background: transparent; box-shadow: none; }
    .tl-icon-btn.ghost:hover:not(:disabled) { background: var(--c-sec); }
    /* header Settings + Copy use the same white styling as the Reset button */
    .tl-header .tl-icon-btn:not(.ghost) { background: #fff; }
    .tl-header .tl-icon-btn:not(.ghost):hover:not(:disabled),
    .tl-header .tl-icon-btn:not(.ghost).is-active { background: #f9f9f9; }
    .tl-header .tl-icon-btn:not(.ghost):active:not(:disabled) { background: #f9f9f9; scale: 0.96; }

    /* secondary button (Reset): Figma default is white, raised with the shared
       button shadow; hover/pressed darken to #f9f9f9 (matches Accept states) */
    .tl-sec-btn { display: inline-flex; align-items: center; height: 36px; padding: 0 16px; border: none;
      border-radius: 8px; background: #fff; box-shadow: var(--shadow-btn);
      color: var(--c-text); font: inherit; font-size: 13px;
      font-weight: 500; cursor: pointer; transition: background 0.12s ease, scale 0.12s ease; white-space: nowrap; }
    .tl-sec-btn:hover:not(:disabled) { background: #f9f9f9; }
    .tl-sec-btn:active:not(:disabled) { background: #f9f9f9; scale: 0.96; }
    .tl-sec-btn:disabled { opacity: 0.5; cursor: default; }

    /* blue button (Refine) — Figma Frame 427319678: layered fill + inset ring + drop shadow */
    .tl-refine-btn { position: relative; isolation: isolate;
      display: inline-flex; align-items: center; gap: 8px; height: 36px; padding: 0 12px;
      border: none; border-radius: 8px; background: transparent; color: var(--c-blue);
      box-shadow: var(--drop-btn);
      font: inherit; font-size: 13px; font-weight: 500; line-height: 14px;
      cursor: pointer; white-space: nowrap; transition: color 0.12s ease; }
    .tl-refine-btn::before { content: ""; position: absolute; inset: 0; border-radius: inherit;
      background: var(--c-blue-bg);
      background: color(display-p3 0 0.451 0.898 / 0.06);
      transition: background 0.12s ease; z-index: 0; }
    .tl-refine-btn::after { content: ""; position: absolute; inset: 0; border-radius: inherit;
      box-shadow: var(--ring-blue);
      pointer-events: none; z-index: 2; }
    .tl-refine-btn > * { position: relative; z-index: 1; }
    /* Figma: wand icon stroke is #0073E5, distinct from the #0071e2 label */
    .tl-refine-btn > svg { color: var(--c-blue-pressed); }
    .tl-refine-btn:hover:not(:disabled)::before { background: var(--c-blue-bg-h); background: color(display-p3 0 0.451 0.898 / 0.10); }
    .tl-refine-btn:active:not(:disabled) { color: var(--c-blue-pressed); }
    .tl-refine-btn:active:not(:disabled)::before { background: var(--c-blue-bg-h); background: color(display-p3 0 0.451 0.898 / 0.10); }
    .tl-refine-btn:disabled { cursor: default; color: var(--c-blue); }
    .tl-refine-btn:disabled::before { background: var(--c-blue-bg); background: color(display-p3 0 0.451 0.898 / 0.06); }
    .tl-refine-btn:disabled span { color: var(--c-blue-pressed); opacity: 0.5; }
    /* tiny 1.5px sparks flying out along each of the wand's spark rays on hover */
    .tl-refine-sparks { position: absolute; left: 23px; top: 15px; width: 0; height: 0; z-index: 3; pointer-events: none; }

    function PropTrack({property, member, delayMs, durationMs, selected, onSelect, onDelayChange, onDurationChange, snap, scaleMs, lockDuration, labelW}){
      const trackRef=useRef(null);

      const pxToMs=useCallback(px=>{if(!trackRef.current)return 0;const w=trackRef.current.getBoundingClientRect().width;return Math.round((px/w)*scaleMs/grid)*grid;},[grid,scaleMs]);

      const startDrag=useCallback((mode,e)=>{
        e.preventDefault(); e.stopPropagation();
        onSelect();
        // a spring controls its own duration, so its bar can be moved (delay) but not resized
        if(lockDuration && mode!=="move") return;
        const startX=e.clientX; const sd=delayMs; const sdur=durationMs;
        const onMove=e2=>{
          const dx=e2.clientX-startX; const dMs=pxToMs(dx);
          if(mode==="move"){
            onDelayChange(Math.max(0,Math.min(sd+dMs,scaleMs-sdur)));
          } else if(mode==="left"){
            const rawDel=sd+dMs; const clampedDel=Math.max(0,Math.min(rawDel,sd+sdur-grid));
            onDelayChange(clampedDel); onDurationChange(sdur-(clampedDel-sd));

          }

        const onUp=()=>{window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);};
        window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);
      },[delayMs,durationMs,pxToMs,grid,scaleMs,onSelect,onDelayChange,onDurationChange,lockDuration]);

        h("div",{className:"tl-prop-head",style:labelW!=null?{flexBasis:labelW+"px"}:undefined},

          h("div",{className:"tl-bar",style:{left:delPct+"%",width:durPct+"%"},onMouseDown:e=>startDrag("move",e),
            title:lockDuration?"Spring duration is derived \u2014 drag to move, resize is locked":undefined},
            h("span",{className:"tl-bar-handle left"}),

            !lockDuration&&h("div",{className:"tl-bar-grip left",onMouseDown:e=>startDrag("left",e)}),

    }

    function ValueField({label, value, min, max, step, tokens, onChange, snap, readOnly, readOnlyHint}){
      const fieldRef = useRef(null);

      const inputRef = useRef(null);
      const[editing,setEditing]=useState(false);
      const[draft,setDraft]=useState("");
      const[dragging,setDragging]=useState(false);
      const[menu,setMenu]=useState(false);
      const pct = Math.min(Math.max((value - min) / (max - min), 0), 1) * 100;
      const grid = snap ? step : Math.max(1, Math.round(step/5));
      const selectAll = useCallback(e=>{
        const el = e && e.target ? e.target : inputRef.current;
        if(!el) return;

      },[]);

      const setFromX = useCallback(clientX => {
        if(!trackRef.current) return;
        const rect = trackRef.current.getBoundingClientRect();
        const ratio = Math.max(0, Math.min((clientX - rect.left) / rect.width, 1));
        const raw = min + ratio * (max - min);
        const snapped = Math.round(raw / grid) * grid;
        onChange(Math.max(min, Math.min(max, snapped)));
      },[min,max,grid,onChange]);

      const startDrag = useCallback(e=>{
        if(editing || readOnly) return;
        e.preventDefault();
        setDragging(true);
        setFromX(e.clientX);
        const onMove = e2 => setFromX(e2.clientX);
        const onUp = () => { setDragging(false); window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); };
        window.addEventListener("mousemove",onMove);
        window.addEventListener("mouseup",onUp);
      },[setFromX,editing]);

      const beginEdit = useCallback(e=>{ e.stopPropagation(); if(readOnly) return; setDraft(String(value)); setEditing(true); },[value,readOnly]);
      const commit = useCallback(()=>{ const n=parseFloat(draft); if(!isNaN(n)) onChange(Math.max(min,Math.min(max,Math.round(n)))); setEditing(false); },[draft,min,max,onChange]);

      const chevRef=useRef(null);
      const wrapRef=useRef(null);
      return h("div",{ref:wrapRef,className:cx("tl-field-wrap",readOnly&&"is-locked")},
        h("div",{ref:fieldRef,className:cx("tl-field",dragging&&"is-dragging",editing&&"is-editing",readOnly&&"is-readonly")},
          h("div",{className:"tl-field-fill",style:{width:pct+"%"}},
            !readOnly&&h("div",{className:"tl-field-thumb"}),

          h("div",{ref:trackRef,className:"tl-field-track",onMouseDown:startDrag}),

                onKeyDown:e=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEditing(false);}})
            : h("span",{className:cx("tl-field-value",readOnly&&"is-readonly"),style:readOnly?{right:"30px"}:null,
                onMouseDown:e=>e.stopPropagation(),onClick:beginEdit},value),
          readOnly&&h("span",{className:"tl-field-lock"},h(Ic,{name:"lock",size:13})),
        ),
        !readOnly&&h("button",{ref:chevRef,className:"tl-field-chevron",onClick:()=>setMenu(v=>!v)},h(Ic,{name:"chevron"})),
        !readOnly&&h(Dropdown,{open:menu,onClose:()=>setMenu(false),triggerRef:chevRef,
          width:(wrapRef.current&&wrapRef.current.offsetWidth)||220,align:"right"},
          (tokens||[]).map(tk=>h(MenuItem,{key:tk.label,active:value===tk.ms,onClick:()=>{onChange(tk.ms);setMenu(false);},
            right:value===tk.ms&&h("span",{className:"tl-menu-check"},h(Ic,{name:"accept"}))},
            h("span",{className:"tl-menu-text"},tk.label,h("span",{className:"tl-menu-dim"}," "+tk.ms+"ms")))) ),
        readOnly&&readOnlyHint&&h("span",{className:"t-tt",role:"tooltip"},readOnlyHint),

    // shared plot geometry for both the easing curve and the spring curve.
    // Compact, landscape box: small horizontal padding (bezier x is clamped 0..1
    // so there is no horizontal overshoot to reserve room for) makes the curve
    // fill the width, while PAD_Y keeps the 0..1 band vertically centered with
    // equal headroom above/below so overshoot/undershoot handles (clamped to the
    // -0.5..1.5 range) stay visible instead of being clipped at the edges.
    const CURVE = { VBW:269, VBH:150, PAD_X:30, PAD_Y:42 };

    // Unified "Preview" section (Figma node 580:11158) — collapsible, collapsed by
    // default (transitions.dev · 21-accordion). Holds BOTH the timing curve card
    // (cubic w/ draggable handles, or the spring curve) AND the animated position
    // preview: a big blue marker travels along a dashed rail using the live timing
    // function + duration, pauses, returns, and loops.
    function Preview({easing, cubic, spring, durationMs, apply}){
      const trackRef = useRef(null);
      const dotRef = useRef(null);
      const svgRef = useRef(null);
      const [playing, setPlaying] = useState(false);
      const [open, setOpen] = useState(false);
      const safeEasing = (!easing || easing.trim()==="") ? "linear" : easing;
      const dur = Math.max(120, durationMs || 0);

      const { VBW, VBH, PAD_X, PAD_Y } = CURVE;
      const plotW = VBW - 2*PAD_X, plotH = VBH - 2*PAD_Y;
      const originX = PAD_X, originY = VBH - PAD_Y, endX = VBW - PAD_X, endY = PAD_Y;
      const fx = f => PAD_X + f*plotW;
      const fy = v => (VBH - PAD_Y) - v*plotH;
      const cb = cubic || [0.25,0.1,0.25,1];
      const setEasing = useCallback(v=>apply({easing:v, spring:null}),[apply]);

      const startHandleDrag = useCallback((pointIdx, e)=>{
        e.preventDefault(); e.stopPropagation();
        const svg = svgRef.current; if(!svg) return;
        const calc = (clientX, clientY) => {
          const rect = svg.getBoundingClientRect();
          const vbx = (clientX - rect.left) / rect.width * VBW;
          const vby = (clientY - rect.top) / rect.height * VBH;
          let x = (vbx - PAD_X) / plotW;
          let y = ((VBH - PAD_Y) - vby) / plotH;
          x = Math.round(Math.max(0, Math.min(1, x)) * 100) / 100;
          y = Math.round(Math.max(-0.5, Math.min(1.5, y)) * 100) / 100;
          const next = [...cb];
          next[pointIdx*2] = x; next[pointIdx*2+1] = y;
          setEasing(`cubic-bezier(${next.join(", ")})`);
        };
        const onMove = e2 => calc(e2.clientX, e2.clientY);
        const onUp = () => { window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); };
        window.addEventListener("mousemove",onMove);
        window.addEventListener("mouseup",onUp);
      },[cb,setEasing,plotW,plotH,VBW,VBH,PAD_X,PAD_Y]);

      // spring curve (read-only) — auto-fit so overshoot above 1 stays in frame
      const springCurve = useMemo(()=>{
        if(!spring) return null;
        const sim = simulateSpring(spring.stiffness, spring.damping, spring.mass ?? 1);
        const vals = sim.values;
        const hi = Math.max(1, ...vals), lo = Math.min(0, ...vals);
        const range = (hi - lo) || 1;
        const sx = i => PAD_X + (i/(vals.length-1))*plotW;
        const sy = v => (VBH - PAD_Y) - ((v - lo)/range)*plotH;
        return { d: vals.map((v,i)=>`${i===0?"M":"L"} ${sx(i).toFixed(2)} ${sy(v).toFixed(2)}`).join(" "),
                 yOne: sy(1), yZero: sy(0) };
      },[spring,plotW,plotH,VBW,VBH,PAD_X,PAD_Y]);

      useEffect(()=>{
        if(!playing || !open) return;
        const dot = dotRef.current, track = trackRef.current;
        if(!dot || !track) return;
        let cancelled = false, anim = null, timer = null, atRight = false;
        const GAP = 480, DOT = 28;
        const travel = ()=> Math.max(0, track.clientWidth - DOT);
        const step = ()=>{
          if(cancelled) return;
          const from = atRight ? travel() : 0;
          const to   = atRight ? 0 : travel();
          try {
            anim = dot.animate(
              [{transform:`translateX(${from}px)`},{transform:`translateX(${to}px)`}],
              {duration:dur, easing:safeEasing, fill:"forwards"});
          } catch {
            anim = dot.animate(
              [{transform:`translateX(${from}px)`},{transform:`translateX(${to}px)`}],
              {duration:dur, easing:"linear", fill:"forwards"});
          }
          anim.onfinish = ()=>{ if(cancelled) return; atRight = !atRight; timer = setTimeout(step, GAP); };
        };
        step();
        return ()=>{ cancelled = true; if(anim){try{anim.cancel();}catch{}} if(timer)clearTimeout(timer); };
      },[playing, open, safeEasing, dur]);

      const p1x = fx(cb[0]), p1y = fy(cb[1]), p2x = fx(cb[2]), p2y = fy(cb[3]);

      return h("div",{className:"tl-preview","data-open":open?"true":"false"},
        h("button",{className:"tl-preview-head","aria-expanded":open,onClick:()=>setOpen(o=>!o)},
          h("span",{className:"tl-preview-title"},"Preview"),
          h("span",{className:"tl-preview-chevron"},h(Ic,{name:"chevron",size:16})),
        ),
        h("div",{className:"tl-preview-panel"},
          h("div",{className:"tl-preview-panel-inner"},
            h("div",{className:"tl-preview-body"},
              h("div",{className:"tl-curve tl-preview-curve"},
                spring
                  ? h("svg",{viewBox:`0 0 ${VBW} ${VBH}`},
                      h("line",{x1:PAD_X,y1:springCurve.yOne,x2:VBW-PAD_X,y2:springCurve.yOne,stroke:"#1A7AFF",strokeWidth:1,strokeDasharray:"3 4",style:{opacity:0.5,pointerEvents:"none"}}),
                      h("line",{x1:PAD_X,y1:springCurve.yZero,x2:VBW-PAD_X,y2:springCurve.yZero,stroke:"rgba(0,0,0,0.18)",strokeWidth:1,strokeDasharray:"3 4",style:{pointerEvents:"none"}}),
                      h("path",{d:springCurve.d,fill:"none",stroke:"#181a1e",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"}),
                    )
                  : h("svg",{ref:svgRef,viewBox:`0 0 ${VBW} ${VBH}`},
                      h("path",{d:`M ${originX} ${originY} C ${p1x} ${p1y}, ${p2x} ${p2y}, ${endX} ${endY}`,
                        fill:"none",stroke:"#181a1e",strokeWidth:2,strokeLinecap:"round"}),
                      h("line",{x1:p1x,y1:p1y,x2:originX,y2:originY,stroke:"#1A7AFF",strokeWidth:2,strokeLinecap:"round",style:{pointerEvents:"none"}}),
                      h("line",{x1:p2x,y1:p2y,x2:endX,y2:endY,stroke:"#1A7AFF",strokeWidth:2,strokeLinecap:"round",style:{pointerEvents:"none"}}),
                      h("circle",{cx:p1x,cy:p1y,r:5.5,fill:"#1A7AFF",style:{pointerEvents:"none",filter:"drop-shadow(0 1px 3px rgba(0,0,0,.25))"}}),
                      h("circle",{cx:p2x,cy:p2y,r:5.5,fill:"#1A7AFF",style:{pointerEvents:"none",filter:"drop-shadow(0 1px 3px rgba(0,0,0,.25))"}}),
                      h("circle",{className:"tl-curve-handle",cx:p1x,cy:p1y,r:9,fill:"transparent",onMouseDown:e=>startHandleDrag(0,e)}),
                      h("circle",{className:"tl-curve-handle",cx:p2x,cy:p2y,r:9,fill:"transparent",onMouseDown:e=>startHandleDrag(1,e)}),
                    ),
              ),
              h("div",{className:"tl-preview-sub"},
                h("span",{className:"tl-preview-sub-label"},"Position preview"),
                h("button",{className:"tl-preview-play",onClick:()=>setPlaying(p=>!p)},playing?"Pause":"Play"),
              ),
              h("div",{className:"tl-preview-track"},
                h("div",{className:"tl-preview-rail-wrap",ref:trackRef},
                  h("span",{className:"tl-preview-rail"}),
                  h("span",{className:"tl-preview-dot",ref:dotRef})),
              ),
            ),
          ),
        ),
      );
    }

    function EasingEditor({easing, cubic, spring, durationMs, propKey, apply}){
      const [tab, setTab] = useState(spring ? "springs" : "easing");
      // when the user selects a different property, reflect that property's mode
      useEffect(()=>{ setTab(spring ? "springs" : "easing"); /* eslint-disable-next-line */ }, [propKey]);

      // remember the last real (non-spring) easing + duration so we can restore
      // them when switching back from the Springs tab (the spring overwrites the
      // duration with its derived settle time).
      const lastEasingRef = useRef("ease");
      const lastEaseDurRef = useRef(durationMs);
      useEffect(()=>{ if(!spring && easing && !/^linear\(/.test(easing)) lastEasingRef.current = easing; }, [easing, spring]);
      useEffect(()=>{ if(!spring && durationMs!=null) lastEaseDurRef.current = durationMs; }, [durationMs, spring]);

      const applySpring = useCallback((stiffness,damping,mass,name)=>{
        const sim = simulateSpring(stiffness,damping,mass);
        apply({ spring:{stiffness,damping,mass,name}, easing:sim.css, durationMs:sim.durationMs });
      },[apply]);

      const selectTab = useCallback(t=>{
        if(t==="springs"){
          setTab("springs");
          if(!spring){ const p=SPRING_PRESETS[0]; applySpring(p.stiffness,p.damping,p.mass,p.label); }
        } else {
          setTab("easing");
          if(spring) apply({ spring:null, easing:lastEasingRef.current||"ease", durationMs:lastEaseDurRef.current });
        }
      },[spring,apply,applySpring]);

      // page-slide between the two tabs (transitions.dev · 08-page-side-by-side).
      // both pages stay mounted so they can cross-slide; the container height
      // follows the active page so it resizes smoothly while sliding.
      const slideRef = useRef(null);
      const easePageRef = useRef(null);
      const springPageRef = useRef(null);
      const page = tab==="springs" ? "2" : "1";
      useLayoutEffect(()=>{
        const slide = slideRef.current; if(!slide) return;
        const active = tab==="springs" ? springPageRef.current : easePageRef.current;
        if(active) slide.style.height = active.offsetHeight + "px";
      });

      return h("div",{className:"tl-ease"},
        h("div",{className:"tl-inspector-divider"}),
        h("div",{className:"tl-seg",role:"tablist"},
          h("button",{className:cx("tl-seg-btn",tab==="easing"&&"is-active"),role:"tab",
            "aria-selected":tab==="easing",onClick:()=>selectTab("easing")},"Easing"),
          h("button",{className:cx("tl-seg-btn",tab==="springs"&&"is-active"),role:"tab",
            "aria-selected":tab==="springs",onClick:()=>selectTab("springs")},"Springs"),
        ),
        h("div",{className:"tl-ease-pages t-page-slide",ref:slideRef,"data-page":page},
          h("div",{className:"t-page",ref:easePageRef,"data-page-id":"1","aria-hidden":tab!=="easing"},
            h(EasingTab,{easing,cubic,setEasing:v=>apply({easing:v, spring:null})})),
          h("div",{className:"t-page",ref:springPageRef,"data-page-id":"2","aria-hidden":tab!=="springs"},
            h(SpringTab,{spring,applySpring})),
        ),
        h(Preview,{easing, cubic, spring, durationMs, apply}),
      );

    function EasingTab({easing, cubic, setEasing}){
      const isPreset = EASING_PRESETS.some(p=>p.keyword===easing);
      const isCubic = !isPreset && /^cubic-bezier\(/.test(easing);
      const isLibrary = EASING_LABEL.has(normEase(easing));
      const mode = isLibrary ? "__lib" : isPreset ? easing : isCubic ? "__cubic" : "__custom";
      const cb = cubic || [0.25,0.1,0.25,1];
      const svgRef = useRef(null);
      const easeRef = useRef(null);
      const [easeOpen, setEaseOpen] = useState(false);
      const selLabel = easingLabel(easing) || (isCubic ? "cubic-bezier(\u2026)" : easing ? easing : "custom");
      // first selectable row whose value matches — so a keyword shared between the
      // transitions.dev and Standard groups only checks once (the first one).
      const selEaseIdx = EASING_LIBRARY.findIndex(o=>o.value&&o.value[0]!=="_"&&normEase(o.value)===normEase(easing));
      const pickEase = useCallback(v=>{
        if(v==="__cubic") setEasing(`cubic-bezier(${cb.join(", ")})`);
        else if(v==="__custom") setEasing("");
        else setEasing(v);
        setEaseOpen(false);
      },[cb,setEasing]);

      const setCubicVal = useCallback((i,v)=>{
        const next = [...cb]; next[i]=Math.round(parseFloat(v)*100)/100;
        if(isNaN(next[i])) return;
        setEasing(`cubic-bezier(${next.join(", ")})`);
      },[cb,setEasing]);

      const { VBW, VBH, PAD_X, PAD_Y } = CURVE;
      const plotW = VBW - 2*PAD_X, plotH = VBH - 2*PAD_Y;
      const originX = PAD_X, originY = VBH - PAD_Y, endX = VBW - PAD_X, endY = PAD_Y;
      const fx = f => PAD_X + f*plotW;
      const fy = v => (VBH - PAD_Y) - v*plotH;

      const startHandleDrag = useCallback((pointIdx, e)=>{
        e.preventDefault(); e.stopPropagation();
        const svg = svgRef.current;
        if(!svg) return;
        const calc = (clientX, clientY) => {
          const rect = svg.getBoundingClientRect();
          const vbx = (clientX - rect.left) / rect.width * VBW;
          const vby = (clientY - rect.top) / rect.height * VBH;
          let x = (vbx - PAD_X) / plotW;
          let y = ((VBH - PAD_Y) - vby) / plotH;
          x = Math.round(Math.max(0, Math.min(1, x)) * 100) / 100;
          y = Math.round(Math.max(-0.5, Math.min(1.5, y)) * 100) / 100;
          const next = [...cb];
          next[pointIdx * 2] = x;
          next[pointIdx * 2 + 1] = y;
          setEasing(`cubic-bezier(${next.join(", ")})`);
        };
        const onMove = e2 => calc(e2.clientX, e2.clientY);
        const onUp = () => { window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); };
        window.addEventListener("mousemove",onMove);
        window.addEventListener("mouseup",onUp);
      },[cb,setEasing,plotW,plotH,VBW,VBH,PAD_X,PAD_Y]);

      const p1x = fx(cb[0]), p1y = fy(cb[1]);
      const p2x = fx(cb[2]), p2y = fy(cb[3]);

      return h(React.Fragment,null,
        h("button",{ref:easeRef,className:cx("tl-select",easeOpen&&"is-open"),onClick:()=>setEaseOpen(v=>!v)},
          h("span",{className:"tl-select-label"},selLabel),
          h("span",{className:"tl-select-chev"},h(Ic,{name:"chevron"}))),
        h(Dropdown,{open:easeOpen,onClose:()=>setEaseOpen(false),triggerRef:easeRef,
          width:Math.max(248,(easeRef.current&&easeRef.current.offsetWidth)||248),align:"left"},
          EASING_LIBRARY.map((o,i)=> o.group
            ? h("div",{key:"g"+i,className:"tl-menu-group"},o.group)
            : h(MenuItem,{key:"e"+i,active:selEaseIdx>=0?i===selEaseIdx:(o.value===mode),
                onClick:()=>pickEase(o.value),
                right:(i===selEaseIdx)&&h("span",{className:"tl-menu-check"},h(Ic,{name:"accept"}))},
                h("span",{className:"tl-menu-text"},o.label)))),
        h("div",{className:"tl-cubic-row"},
          ...[0,1,2,3].map(i=>h("div",{key:i,className:"tl-cubic-cell"},
            h("input",{type:"number",step:0.05,min:i%2===0?0:undefined,max:i%2===0?1:undefined,
              value:cb[i],onChange:e=>setCubicVal(i,e.target.value)}))),
        ),
        mode==="__custom" && h("input",{className:"tl-custom-input",value:easing,
          placeholder:"e.g. steps(4, end)",
          onChange:e=>setEasing(e.target.value)}),
      );
    }

    // Spring physics scrubber — reuses the exact Figma "Value slider and input"
    // (.tl-field) component used by Duration/Delay, minus the chevron stepper.
    // Supports fractional values (Mass) via `decimals`.
    function SpringField({label, value, min, max, step, decimals, onChange}){
      const trackRef = useRef(null);
      const inputRef = useRef(null);
      const [editing,setEditing]=useState(false);
      const [draft,setDraft]=useState("");
      const [dragging,setDragging]=useState(false);
      const pct = Math.min(Math.max((value - min) / (max - min), 0), 1) * 100;
      const fmt = v => decimals ? Number(v).toFixed(decimals) : String(Math.round(v));
      const clampSnap = raw => {
        const snapped = Math.round(raw / step) * step;
        const c = Math.max(min, Math.min(max, snapped));
        const p = Math.pow(10, decimals || 0);
        return Math.round(c * p) / p;
      };
      const setFromX = useCallback(clientX => {
        if(!trackRef.current) return;
        const rect = trackRef.current.getBoundingClientRect();
        const ratio = Math.max(0, Math.min((clientX - rect.left) / rect.width, 1));
        onChange(clampSnap(min + ratio * (max - min)));
      },[min,max,step,decimals,onChange]);
      const startDrag = useCallback(e=>{
        if(editing) return;
        e.preventDefault(); setDragging(true); setFromX(e.clientX);
        const onMove = e2 => setFromX(e2.clientX);
        const onUp = () => { setDragging(false); window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); };
        window.addEventListener("mousemove",onMove); window.addEventListener("mouseup",onUp);
      },[setFromX,editing]);
      const selectAll = useCallback(e=>{ const el=e&&e.target?e.target:inputRef.current; if(!el)return; requestAnimationFrame(()=>el.select()); },[]);
      const beginEdit = useCallback(e=>{ e.stopPropagation(); setDraft(fmt(value)); setEditing(true); },[value,decimals]);
      const commit = useCallback(()=>{ const n=parseFloat(draft); if(!isNaN(n)) onChange(clampSnap(n)); setEditing(false); },[draft,min,max,step,decimals,onChange]);
      return h("div",{className:cx("tl-field-wrap","tl-spring-field")},
        h("div",{className:cx("tl-field",dragging&&"is-dragging",editing&&"is-editing")},
          h("div",{className:"tl-field-fill",style:{width:pct+"%"}},
            h("div",{className:"tl-field-thumb"})),
          h("div",{ref:trackRef,className:"tl-field-track",onMouseDown:startDrag}),
          h("span",{className:"tl-field-label"},label),
          editing
            ? h("input",{ref:inputRef,className:"tl-field-input",autoFocus:true,value:draft,
                onChange:e=>setDraft(e.target.value),onBlur:commit,onFocus:selectAll,
                onKeyDown:e=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEditing(false);}})
            : h("span",{className:"tl-field-value",onMouseDown:e=>e.stopPropagation(),onClick:beginEdit},fmt(value)),
        ),
      );
    }

    function SpringTab({spring, applySpring}){
      const sp = spring || { ...SPRING_PRESETS[0] };
      const stiffness = sp.stiffness, damping = sp.damping, mass = sp.mass ?? 1;
      const presetName = matchSpringPreset({stiffness,damping,mass});
      const spRef = useRef(null);
      const [spOpen, setSpOpen] = useState(false);

      const sim = useMemo(()=>simulateSpring(stiffness,damping,mass),[stiffness,damping,mass]);
      const overshoots = useMemo(()=>sim.values.some(v=>v>1.001),[sim]);

      const setParam = useCallback((key,val)=>{
        const next = { stiffness, damping, mass };
        next[key] = val;
        applySpring(next.stiffness, next.damping, next.mass, matchSpringPreset(next));
      },[stiffness,damping,mass,applySpring]);

      return h(React.Fragment,null,
        h("button",{ref:spRef,className:cx("tl-select",spOpen&&"is-open"),onClick:()=>setSpOpen(v=>!v)},
          h("span",{className:"tl-select-label"},presetName==="Custom"?"Custom spring":presetName),
          h("span",{className:"tl-select-chev"},h(Ic,{name:"chevron"}))),
        h(Dropdown,{open:spOpen,onClose:()=>setSpOpen(false),triggerRef:spRef,
          width:Math.max(248,(spRef.current&&spRef.current.offsetWidth)||248),align:"left"},
          SPRING_PRESETS.map(p=>h(MenuItem,{key:p.label,active:p.label===presetName,
            onClick:()=>{applySpring(p.stiffness,p.damping,p.mass,p.label);setSpOpen(false);},
            right:p.label===presetName&&h("span",{className:"tl-menu-check"},h(Ic,{name:"accept"}))},
            h("span",{className:"tl-menu-text"},p.label)))),
        h("div",{className:"tl-spring-fields"},
          h(SpringField,{label:"Stiffness",value:stiffness,min:20,max:400,step:5,
            onChange:v=>setParam("stiffness",v)}),
          h(SpringField,{label:"Damping",value:damping,min:1,max:120,step:1,
            onChange:v=>setParam("damping",v)}),
          h(SpringField,{label:"Mass",value:mass,min:0.2,max:5,step:0.1,decimals:1,
            onChange:v=>setParam("mass",v)}),
        ),
        h("div",{className:"tl-spring-dur"},
          "Duration ", h("b",null,sim.durationMs+"ms"), " Derived",
          overshoots&&h("span",{className:"tl-spring-dur-hint"}," · overshoots"),
        ),
      );
    }

    function Tracks({et, selLane, setSelLane, onPropChange, snap, scaleMs}){
      const rowsRef = useRef(null);
      const tracksRef = useRef(null);
      const [order, setOrder] = useState([]);
      // Width of the label column (shared by the ruler spacer + every prop-row
      // head). Draggable via the divider; the bars column is flex:1 so it just
      // takes the remaining space and the bars stay proportional to scaleMs.
      const LABEL_MIN = 96, LABEL_TRACK_MIN = 160;
      const [labelW, setLabelW] = useState(LABEL_W);
      const [colDragging, setColDragging] = useState(false);
      const startColResize = useCallback(e=>{
        e.preventDefault(); e.stopPropagation();
        const startX = e.clientX, startW = labelW;
        const maxW = tracksRef.current
          ? Math.max(LABEL_MIN, tracksRef.current.getBoundingClientRect().width - LABEL_TRACK_MIN)
          : 360;
        setColDragging(true);
        document.body.style.cursor = "col-resize"; document.body.style.userSelect = "none";
        const onMove = e2 => setLabelW(Math.max(LABEL_MIN, Math.min(maxW, startW + (e2.clientX - startX))));
        const onUp = () => { setColDragging(false); document.body.style.cursor=""; document.body.style.userSelect="";
          window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); };
        window.addEventListener("mousemove",onMove); window.addEventListener("mouseup",onUp);
      },[labelW]);
      const laneKey = et.map(x=>x.laneId).join("|");
      useEffect(()=>{
        const ids = et.map(x=>x.laneId);
        setOrder(prev=>{
          const kept = prev.filter(p=>ids.includes(p));
          const added = ids.filter(p=>!kept.includes(p));
          return [...kept, ...added];
        });
      },[laneKey]);
      const orderedRows = order.map(p=>et.find(x=>x.laneId===p)).filter(Boolean);
      const majorStep = scaleMs <= 2000 ? 500 : scaleMs <= 10000 ? 1000 : scaleMs <= 25000 ? 5000 : 10000;
      const minorStep = majorStep / 4;
      const ruler=[];
      for(let ms=0; ms<=scaleMs; ms+=majorStep){
        const left=(ms/scaleMs)*100;
        ruler.push(h("span",{key:"l"+ms,className:cx("maj",ms===0&&"first",ms===scaleMs&&"last"),style:{left:left+"%"}},(ms/1000)+"s"));
      }
      for(let ms=minorStep; ms<scaleMs; ms+=minorStep){
        if(ms%majorStep===0) continue;
        ruler.push(h("span",{key:"t"+ms,className:"tick",style:{left:((ms/scaleMs)*100)+"%"}}));
      }
      return h("div",{className:"tl-tracks",ref:tracksRef},
        h("div",{className:"tl-ruler-row"},
          h("div",{className:"tl-ruler-spacer",style:{flexBasis:labelW+"px"}}),
          h("div",{className:"tl-ruler"},...ruler)),
        h("div",{className:"tl-rows",ref:rowsRef},
          ...orderedRows.map(row=>h(PropTrack,{
            key:row.laneId, property:row.property, member:row.member,
            delayMs:row.delayMs, durationMs:row.durationMs, lockDuration:!!row.spring,
            selected:row.laneId===selLane, snap, scaleMs, labelW,
            onSelect:()=>setSelLane(row.laneId),
            onDelayChange:ms=>onPropChange(row.laneId,{delayMs:ms}),
            onDurationChange:ms=>onPropChange(row.laneId,{durationMs:ms}),
          }))),
        h("div",{className:cx("tl-col-resizer",colDragging&&"dragging"),style:{left:labelW+"px"},
          onMouseDown:startColResize,title:"Drag to resize columns","aria-label":"Resize label column",role:"separator"},
          h("span",{className:"tl-col-resizer-line"})),
      );
    }

    function Inspector({entry, selLane, onPropChange, snap}){
      const et = entry.effectiveTimings || [];
      const sel = et.find(t=>t.laneId===selLane) || et[0];
      if(!sel) return h("div",{className:"tl-inspector"});
      const cubic = easingToCubic(sel.easing);
      const isSpring = !!sel.spring;
      return h("div",{className:"tl-inspector"},
        h("div",{className:"tl-insp-title"},
          sel.member&&h("span",{className:"tl-insp-member"},sel.member),
          h("span",null,sel.property)),
        h(ValueField,{label:"Duration",value:sel.durationMs,min:0,max:5000,step:25,tokens:DURATION_TOKENS,snap,
          readOnly:isSpring,
          readOnlyHint:"Duration is set by the spring. A spring's settle time is derived from its stiffness, damping and mass \u2014 so it can't be edited directly. Switch to the Easing tab to set a fixed duration.",
          onChange:v=>onPropChange(sel.laneId,{durationMs:v})}),
        h(ValueField,{label:"Delay",value:sel.delayMs,min:0,max:5000,step:25,tokens:DELAY_TOKENS,snap,

    function Body({entry, onPropChange, snap}){
      const et = entry.effectiveTimings || [];
      const [selLane, setSelLane] = useState(et[0]?.laneId ?? null);
      // No playback: the real component is the preview. The track scale just
      // auto-fits the longest lane (duration+delay) with a little headroom so
      // the static bars stay readable across short and long transitions.
      const maxEnd = et.reduce((m,t)=>Math.max(m,(t.durationMs||0)+(t.delayMs||0)),0);
      const scaleMs = Math.max(500, Math.ceil((maxEnd*1.15)/250)*250);
      useEffect(()=>{
        if(et.length && !et.find(t=>t.laneId===selLane)) setSelLane(et[0]?.laneId);
      },[et,selLane]);

      return h("div",{className:"tl-body"},
        h("div",{className:"tl-main"},
          h(Tracks,{et,selLane,setSelLane,onPropChange,snap,scaleMs}),
        ),
        h(Inspector,{entry,selLane,onPropChange,snap}),
      );
    }

    function TimelinePanel(){
      const entries=useReg(); const{active,setActiveId}=useActive();
      const{setPropOverride}=usePropOverride();
      const{registry}=useContext(TimelineCtx);
      const[copied,setCopied]=useState(false);
      // tiny transient toast (e.g. "Values copied"); {msg,id,closing,loader}
      // loader toasts (e.g. "Agent accepting changes") are sticky — they stay up
      // with a dot-matrix loader until dismissed by the caller, no auto-hide.
      const[toast,setToast]=useState(null);
      const showToast=useCallback((msg,opts)=>{setToast({msg,id:Date.now(),closing:false,loader:!!(opts&&opts.loader)});},[]);
      const dismissToast=useCallback(()=>{setToast(t=>t&&!t.closing?{...t,closing:true}:t);},[]);
      useEffect(()=>{
        if(!toast||toast.closing||toast.loader)return;
        const hide=setTimeout(()=>setToast(t=>t&&t.id===toast.id?{...t,closing:true}:t),1800);
        return()=>clearTimeout(hide);
      },[toast&&toast.id,toast&&toast.closing,toast&&toast.loader]);
      useEffect(()=>{
        if(!toast||!toast.closing)return;
        const kill=setTimeout(()=>setToast(t=>t&&t.id===toast.id?null:t),360);
        return()=>clearTimeout(kill);
      },[toast&&toast.id,toast&&toast.closing]);
      const[minimized,setMinimized]=useState(false);
      const[panelHeight,setPanelHeight]=useState(440);
      const[resizing,setResizing]=useState(false);
      const[snap,setSnap]=useState(true);
      // ── refine ──
      const[refineOpen,setRefineOpen]=useState(false);
      const[refinePhase,setRefinePhase]=useState("idle"); // idle | scanning | done | error
      const[refineJobId,setRefineJobId]=useState(null);
      const[refineLog,setRefineLog]=useState([]);
      const[refineSuggestions,setRefineSuggestions]=useState([]);
      const[refineSummary,setRefineSummary]=useState(null);
      const[refineError,setRefineError]=useState(null);
      // ── accept (write to source) ──
      const[acceptState,setAcceptState]=useState("idle"); // idle | saving | done | error
      const[acceptError,setAcceptError]=useState(null);
      // ── grouped scan (agent reads source → Open/Close phases) ──
      const[groupScanState,setGroupScanState]=useState("idle"); // idle | scanning | done | error
      // Escape hatch for the gate: if a scan errors/times out the user can choose
      // to proceed with the flat (ungrouped) list instead of being trapped.
      const[skipGrouping,setSkipGrouping]=useState(false);
      const didGroupScanRef=useRef(false);
      const[refineLabel,setRefineLabel]=useState(null);
      const[appliedIds,setAppliedIds]=useState({});
      const[refineMode,setRefineMode]=useState("llm"); // llm (Agent) | deterministic
      const[refineType,setRefineType]=useState("small"); // small | replace
      const[llmAvailable,setLlmAvailable]=useState(null); // null=unknown, true/false from /health
      const[cliInstalled,setCliInstalled]=useState(null); // null=unknown, true/false from /health
      // probe the relay so the idle panel can show the right availability copy
      const refreshHealth=useCallback(async()=>{
        try{const j=await relayHealth();setLlmAvailable(!!j.llmAvailable);
          setCliInstalled(j.cliInstalled==null?null:!!j.cliInstalled);return j;}
        catch{setLlmAvailable(false);setCliInstalled(false);return null;}
      },[]);
      // a live agent = the relay reports an agent it can drive (REFINE_AGENT_CMD
      // wired OR a `/refine live` loop polling). Until then the panel is gated.
      const live = llmAvailable===true;
      // poll /health continuously so the panel reacts when `/refine live` is run
      // (gate → scanning) or when the agent disconnects (re-gate). 2s cadence.
      useEffect(()=>{
        let alive=true;
        refreshHealth();
        const id=setInterval(()=>{if(alive)refreshHealth();},2000);
        return()=>{alive=false;clearInterval(id);};
      },[refreshHealth]);
      // the Refine button toggles the panel; opening drops into the idle state
      // (description + Start scanning) rather than auto-scanning.
      const openRefine=useCallback(()=>{
        if(!active)return;
        if(refineOpen){setRefineOpen(false);return;}
        setRefineOpen(true);setRefinePhase("idle");setRefineLog([]);
        setRefineSuggestions([]);setRefineSummary(null);setRefineError(null);
        setAppliedIds({});setRefineLabel(active.label);setRefineJobId(null);
        refreshHealth();
      },[active,refineOpen,refreshHealth]);
      // "Start scanning" resolves availability first, then posts the job.
      const startScan=useCallback(async()=>{
        if(!active)return;
        setRefinePhase("scanning");setRefineLog([]);
        setRefineSuggestions([]);setRefineSummary(null);setRefineError(null);
        setAppliedIds({});setRefineLabel(active.label);setRefineJobId(null);
        const j=await refreshHealth();
        const avail=j?!!j.llmAvailable:false;
        const mode=(refineMode==="llm"&&!avail)?"deterministic":refineMode;
        if(mode!==refineMode)setRefineMode(mode);
        try{
          const et=active.effectiveTimings||[];
          const timings=et.map(t=>({property:t.property,member:t.member||null,durationMs:t.durationMs,delayMs:t.delayMs,easing:t.easing}));
          const selector=(active.bindings&&active.bindings.selector)||(et[0]&&et[0].selector)||null;
          // always scan for BOTH kinds (token tweaks + a whole-transition replacement)
          // in one pass; the tabs just filter which kind they show.
          const{id}=await relayCreateJob({transitionId:active.id,label:active.label,selector,
            phase:active.phase||null,group:active.groupLabel||null,timings,mode,refineType:"both"});
          setRefineJobId(id);
        }catch(e){
          setRefinePhase("error");
          setRefineError(h(React.Fragment,null,"Couldn't reach the refine relay. Start it with ",h("code",{className:"tl-code"},"npx transitions-refine live"),"."));
        }
      },[active,refineMode,refineType,refreshHealth]);
      const changeRefineMode=useCallback((mode)=>{setRefineMode(mode);setRefinePhase("idle");refreshHealth();},[refreshHealth]);
      // switching tabs only changes which kind of suggestion is shown — it never
      // interrupts a scan or discards results, since one scan covers both kinds.
      const changeRefineType=useCallback((t)=>{setRefineType(t);},[]);
      // poll the relay while a job is running
      useEffect(()=>{
        if(!refineJobId||refinePhase!=="scanning")return;
        let live=true,to=null;
        const tick=async()=>{
          try{
            const job=await relayGetJob(refineJobId);
            if(!live)return;
            if(Array.isArray(job.statusLog))setRefineLog(job.statusLog);
            if(job.status==="done"){setRefineSuggestions((job.result&&job.result.suggestions)||[]);setRefineSummary(job.result&&job.result.summary);setRefinePhase("done");return;}
            if(job.status==="error"){setRefineError(job.error||"The agent reported an error.");setRefinePhase("error");return;}
            to=setTimeout(tick,500);
          }catch(e){if(live){setRefineError("Lost connection to the relay.");setRefinePhase("error");}}
        };
        to=setTimeout(tick,400);
        return()=>{live=false;if(to)clearTimeout(to);};
      },[refineJobId,refinePhase]);
      const applySuggestion=useCallback((s)=>{
        const p=s.patch||{};if(!p.property)return;
        const o={};
        if(p.durationMs!=null)o.durationMs=p.durationMs;
        if(p.delayMs!=null)o.delayMs=p.delayMs;
        if(p.easing!=null)o.easing=p.easing;
        // map a property patch onto the matching lane(s) — for a grouped phase the
        // same property can appear on several members, so apply to each.
        const et=(active&&active.effectiveTimings)||[];
        let lanes=p.property==="all"?et:et.filter(t=>t.property===p.property);
        if(p.member)lanes=lanes.filter(t=>(t.member===p.member||t.memberId===p.member));
        const ids=lanes.length?lanes.map(t=>t.laneId):[p.property];
        for(const id of ids)setPropOverride(id,o);
        setAppliedIds(prev=>({...prev,[s.id]:true}));
      },[setPropOverride,active]);
      const applyAllSuggestions=useCallback(()=>{
        for(const s of refineSuggestions){if(!appliedIds[s.id])applySuggestion(s);}
      },[refineSuggestions,appliedIds,applySuggestion]);
      const panelMinH=200;
      const panelMaxH=useCallback(()=>Math.round(window.innerHeight*0.92),[]);
      useEffect(()=>{if(!active&&entries.length>0)setActiveId(entries[0].id);},[active,entries,setActiveId]);
      // ── live styling ──────────────────────────────────────────────────────
      // With playback gone, the real component IS the preview. So whenever a
      // transition has edits, mirror its effective timings onto the live
      // element(s) as an inline `transition`, and revert when edits are cleared.
      // Interacting with the component then animates with the edited values.
      const liveAppliedRef=useRef(new Map()); // el → {prevInline, css}
      useEffect(()=>{
        if(typeof document==="undefined")return;
        const applied=liveAppliedRef.current;
        const desired=new Map(); // el → css
        const add=(els,css)=>{ for(const el of els){ if(!el||(el.closest&&el.closest("[data-timeline-panel]")))continue; desired.set(el,css); } };
        for(const item of entries){
          const ov=registry.getPropOverrides(item.id);
          if(!ov||!Object.keys(ov).length)continue; // only edited transitions go live
          if(item.kind==="phase"){
            for(const m of (item.members||[])){
              if(!m.selector||!m.lanes||!m.lanes.length)continue;
              let els=[];try{els=Array.from(document.querySelectorAll(m.selector));}catch{}
              add(els,transitionLanesToCss(m.lanes));
            }
          }else{
            const lanes=item.effectiveTimings||[];
            if(!lanes.length)continue;
            const els=((item.bindings&&item.bindings.elements)||[]).map(w=>w.deref&&w.deref()).filter(Boolean);
            add(els,transitionLanesToCss(lanes));
          }
        }
        // apply new / changed
        for(const [el,css] of desired){
          const cur=applied.get(el);
          if(cur&&cur.css===css)continue;
          if(!cur){
            const s=getComputedStyle(el);
            const z=zipTransitionLists((s.transitionProperty||"").split(","),(s.transitionDuration||"0s").split(","),(s.transitionDelay||"0s").split(","),splitCssValues(s.transitionTimingFunction||"ease"));
            _TX_LIVE_BASE.set(el,{z});
            applied.set(el,{prevInline:el.style.transition||"",css});
          }else applied.set(el,{prevInline:cur.prevInline,css});
          try{el.style.transition=css;}catch{}
        }
        // revert elements that no longer have edits
        for(const [el,rec] of Array.from(applied)){
          if(desired.has(el))continue;
          try{el.style.transition=rec.prevInline;}catch{}
          _TX_LIVE_BASE.delete(el);
          applied.delete(el);
        }
      },[entries,registry]);
      // restore everything on unmount
      useEffect(()=>()=>{
        const applied=liveAppliedRef.current;

      },[]);
      const startResize=useCallback(e=>{
        e.preventDefault();
        const startY=e.clientY; const startH=panelHeight;
        setResizing(true);
        document.body.style.cursor="ns-resize";
        document.body.style.userSelect="none";
        const onMove=e2=>setPanelHeight(Math.max(panelMinH,Math.min(panelMaxH(),startH+(startY-e2.clientY))));
        const onUp=()=>{setResizing(false);document.body.style.cursor="";document.body.style.userSelect="";window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);};

      const copyValues=useCallback(()=>{
        if(!active)return;

        let text;
        if(et.some(t=>t.member)){

            `/* ${m.member||"element"}${m.selector?" — "+m.selector:""} */\ntransition: ${m.lanes.map(decl).join(",\n            ")};`

      // the user's source, then reflect saving / done / error on the button.
      const onAccept=useCallback(async()=>{

        if(!active||!changes.length)return;

            selector:active.bindings&&active.bindings.selector,
            group:active.groupLabel||null,phase:active.phase||null,component:active.component||null,

            await new Promise(r=>setTimeout(r,500));
            const job=await relayGetJob(id);

              if(job.result&&job.result.applied===false){
                setAcceptState("error");setAcceptError((job.result&&job.result.summary)||"The agent couldn't find this transition in your source.");

      useEffect(()=>{setAcceptState("idle");setAcceptError(null);},[active&&active.id]);
      // while the agent is applying changes, surface the sticky loader toast
      // ("Agent accepting changes"); dismiss only when leaving saving (not on
      // every idle tick — that would kill unrelated toasts like "Values copied").
      const prevAcceptRef=useRef(acceptState);
      useEffect(()=>{
        if(acceptState==="saving"){showToast("Agent accepting changes",{loader:true});}
        else if(prevAcceptRef.current==="saving"){dismissToast();}
        prevAcceptRef.current=acceptState;
      },[acceptState,showToast,dismissToast]);
      // The grouped scan asks the agent to read the source and return Open/Close
      // phases — an expensive LLM round-trip. So it runs ONLY:
      //   1. the first time this page is ever opened (nothing cached), or
      //   2. on demand via Settings → "Rescan transitions".
      // The result is cached in localStorage by page path. A plain reload
      // re-hydrates the groups instantly and NEVER touches the agent. Use
      // "Rescan transitions" after the page's transitions actually change.
      const GROUP_STORE_KEY="tlGroups:"+location.pathname;
      // content signature of the flat transitions — so cached groups invalidate
      // automatically when the page's transitions change (e.g. the demo content
      // was swapped under the same pathname). Computed from the SETTLED flat set.
      const flatSig=useCallback((flat)=>flat.map(e=>[e.label,e.bindings&&e.bindings.selector,(e.properties||[]).join(","),e.durationMs,e.delayMs,e.easing].join("|")).sort().join("\u00a7"),[]);
      const readGroupCache=useCallback(()=>{
        try{const c=JSON.parse(localStorage.getItem(GROUP_STORE_KEY)||"null");
          return c&&Array.isArray(c.groups)&&c.groups.length?c:null;}catch{return null;}
      },[GROUP_STORE_KEY]);
      // monotonic token so an unmount or a newer rescan supersedes an in-flight poll
      const scanTokenRef=useRef(0);
      const runGroupScan=useCallback(async()=>{
        const token=++scanTokenRef.current;
        setGroupScanState("scanning");
        // wait for the flat DOM scan to settle (count stable twice) so the agent
        // sees every transition, not a partial set discovered progressively.
        // Capped (~12s) so a page with no resolvable flat entries can never hang
        // the panel on "Grouping…" — it falls through to the empty-flat check below.
        let prev=-1,stable=0,iters=0;
        while(scanTokenRef.current===token&&iters++<40){
          const n=registry.getAll().filter(e=>e.kind!=="phase").length;
          if(n>0&&n===prev){if(++stable>=2)break;}else stable=0;
          prev=n;
          await new Promise(r=>setTimeout(r,300));
        }
        if(scanTokenRef.current!==token)return;
        const flat=registry.getAll().filter(e=>e.kind!=="phase");
        if(!flat.length){setGroupScanState("idle");return;}
        // valid cache (same content signature) → apply instantly, skip the agent.
        // A stale cache (different sig, e.g. content changed) falls through to a
        // fresh scan and is overwritten below.
        const sig=flatSig(flat);
        const cached=readGroupCache();
        if(cached&&cached.sig===sig){registry.setGroups(cached.groups);setGroupScanState("done");return;}
        setGroupScanState("scanning");
        const raw=flat.map(e=>({label:e.label,selector:e.bindings&&e.bindings.selector,
          properties:e.properties,
          timings:(e.baseLanes||[]).map(l=>({property:l.property,durationMs:l.durationMs,delayMs:l.delayMs,easing:l.easing}))}));
        try{
          const{id}=await relayCreateJob({kind:"scan",url:location.href,raw});
          for(let i=0;i<520;i++){
            if(scanTokenRef.current!==token)return; // superseded / unmounted
            await new Promise(r=>setTimeout(r,500));
            if(scanTokenRef.current!==token)return;
            const job=await relayGetJob(id);
            if(job.status==="done"){
              const groups=(job.result&&job.result.groups)||[];
              if(groups.length){registry.setGroups(groups);
                try{localStorage.setItem(GROUP_STORE_KEY,JSON.stringify({groups,sig,ts:Date.now()}));}catch{}}

            if(job.status==="error"){setGroupScanState("error");return;}

        }catch(e){ setGroupScanState("error"); /* relay down → stay flat, retry next open */ }
      },[registry,GROUP_STORE_KEY,flatSig,readGroupCache]);
      // manual "Rescan transitions" — drop the cache AND clear the in-memory
      // groups first. Once groups claim every DOM transition the snapshot has no
      // "flat" entries left, so the settle loop above would otherwise spin forever
      // waiting for a flat count that never arrives. Clearing groups re-surfaces
      // the flat entries the agent needs to re-group.
      const rescanTransitions=useCallback(()=>{
        try{localStorage.removeItem(GROUP_STORE_KEY);}catch{}

        setSkipGrouping(false); // re-engage the gate so a fresh scan can be shown
        runGroupScan();
      },[runGroupScan,GROUP_STORE_KEY,registry]);
      // Gate the auto group-scan behind a live agent: the panel stays on the
      // "Before we start" screen until `/refine live` (or a wired REFINE_AGENT_CMD)
      // makes the relay report an agent. The first time we see a live agent we run
      // the resolver once — it settles the flat scan, then re-applies cached groups
      // (signature match, no agent) or kicks off a fresh agent scan. Rescan is
      // manual after that.
      useEffect(()=>{
        if(!live||didGroupScanRef.current)return;

      },[live,runGroupScan]);

      // whole-component open/close uses the transitions.dev panel reveal:
      // keep the panel mounted while it animates, flip data-open on the next
      // frame so the closed → open transition runs, and delay unmount on close.
      const[render,setRender]=useState(!minimized);
      const[panelOpen,setPanelOpen]=useState(false);

      // → close-distance/close-scale end point. First mount opens, so start here.

        setPanelOpen(false);

        // tweak values from the controls don't clip the animation. +80ms buffer.
        const closeMs=parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--panel-close-dur"))||350;
        to=setTimeout(()=>setRender(false),closeMs+80);
        return()=>clearTimeout(to);
      },[minimized]);

      // demo controls (top-right) drive open/close so tweaks can be previewed
      // without hunting for the Minimize button. "replay" closes then re-opens.
      useEffect(()=>{
        const onToggle=(e)=>{

          if(action==="toggle"){setMinimized(v=>!v);return;}

      // scanned the page's transitions.
      //   loading    → first /health probe pending (blank, avoids a text flash)
      //   blocked    → no live agent → "Before we start" (run /refine live)
      //   scanning   → live agent, scan in flight → "Agent is scanning…"
      //   scan-error → scan failed/timed out → recoverable (retry / continue)
      //   ready      → live + scan settled (done or idle, or user skipped) → real UI
      // NOTE: "idle" and "error" must NOT keep us on the scanning screen, or a
      // timed-out scan (e.g. an older /refine-live skill that can't answer scan
      // jobs) would trap the panel forever with no way out.
      const gate = !live
        ? (llmAvailable===null ? "loading" : "blocked")

        render&&h("div",{className:"t-panel-slide","data-timeline-panel":true,
            "data-open":panelOpen?"true":"false","data-phase":phase,style:{height:panelHeight+"px"}},
          h("div",{className:cx("tl-resize-handle",resizing&&"dragging"),onMouseDown:startResize,title:"Drag to resize"}),
          h("div",{className:"tl-panel-body"},
            gate==="ready"

                  h("div",{className:"tl-panel-main"},
                    h(Header,{entries,active,onSelect:setActiveId,onReset:resetOverrides,onCopy:copyValues,copied,
                      snap,setSnap,onMinimize:()=>setMinimized(true),onRefine:openRefine,refineActive:refineOpen,

                    h("div",{className:"tl-gate-col"},
                      h("div",{className:"tl-gate-title"},"Before we start"),
                      h("p",{className:"tl-gate-text"},
                        "Please run the ",h("code",{className:"tl-code"},"/refine live"),
                        " command in your agent to enable live features, such as scanning and refining transitions."))),

                    h("div",{className:"tl-gate-col"},
                      h("div",{className:"tl-gate-pill-wrap"},
                        h(BorderBeam,{size:"sm",colorVariant:"ocean",theme:"light",borderRadius:18,duration:2.6,saturation:2,brightness:1.6,className:"tl-gate-beam"},
                          h("span",{className:"tl-gate-beam-fill"})),
                        h("span",{className:"tl-gate-pill"},
                          h(DotmLoader),
                          h("span",{className:"tl-gate-pill-label"},"Agent is scanning your transitions"))),
                      h("p",{className:"tl-gate-sub"},"Just a moment while we get things ready."))),
